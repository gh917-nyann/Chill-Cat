<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nyann</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: linear-gradient(270deg, #0f2027, #203a43, #2c5364, #1a2a6c);
            background-size: 800% 800%;
            animation: gradientMove 20s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        img {
            position: absolute;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>
    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px;"></div>

    <script>
        // ==========================================
        // 1. KHỞI TẠO & BIẾN TOÀN CỤC
        // ==========================================
        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

        const particles = [];       // Sao trắng nền
        const trailParticles = [];  // Sao màu đuôi sao băng
        const smallStars = [];      // Sao xẹt (vệt sáng)
        const objects = [];         // Các ảnh GIF

        const STAR_COUNT = 400;
        const TOTAL_GIFS = 18;
        const INIT_COUNT = 120;

        let bigStar = null;
        let crowdTimer = 0;
        let regionTimer = 0;
        const CROWD_DELAY = 10;

        // Trạng thái chuột cho tính năng Lỗ đen / Big Bang
        let mouse = { x: -1000, y: -1000 };
        let isMouseDown = false;
        let isPulling = false;
        let mouseDownTime = 0;

        // Điểm phát xạ sao di động (Nguồn sinh sao trắng)
        let emitter = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            vx: 1.2,
            vy: 0.8
        };

        // Danh sách link GIF
        const gifs = [];
        for (let i = 1; i <= TOTAL_GIFS; i++) {
            gifs.push(`gif/gif${i}.gif`);
        }

        // ==========================================
        // 2. HÀM HỖ TRỢ (UTILITIES)
        // ==========================================
        function randomSize() { return 60 + Math.random() * 60; }
        function randomGif() { return gifs[Math.floor(Math.random() * gifs.length)]; }

        function createParticle(isInitial = false) {
            return {
                x: isInitial ? Math.random() * canvas.width : emitter.x,
                y: isInitial ? Math.random() * canvas.height : emitter.y,
                size: Math.random() * 2.5,
                opacity: Math.random(),
                fade: Math.random() * 0.02 + 0.005,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                color: "rgba(255, 255, 255, "
            };
        }

        function spawnSmallStar() {
            smallStars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * 0.6,
                vx: 4 + Math.random() * 6,
                vy: 1 + Math.random() * 3,
                life: 0,
                maxLife: 20 + Math.random() * 30
            });
        }

        function spawnBigStar() {
            bigStar = {
                x: -150,
                y: Math.random() * canvas.height,
                vx: 10 + Math.random() * 5,
                vy: (Math.random() - 0.5) * 10,
                curve: (Math.random() - 0.5) * 0.15
            };
        }

        function createObject(x, y) {
            const img = document.createElement("img");
            img.src = randomGif();
            let size = randomSize();
            img.style.width = size + "px";
            img.style.height = size + "px";
            document.body.appendChild(img);

            objects.push({
                el: img,
                size: size,
                x: x ?? Math.random() * (window.innerWidth - size),
                y: y ?? Math.random() * (window.innerHeight - size),
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,
                baseVx: (Math.random() - 0.5) * 2,
                baseVy: (Math.random() - 0.5) * 2,
                angle: Math.random() * 360,
                va: (Math.random() - 0.5) * 12,
                knockTime: 0,
                scale: 0,
                scaleV: 0.2
            });
        }

        function applyRandomSize(o) {
            let newSize = randomSize();
            o.size = newSize;
            o.el.style.width = newSize + "px";
            o.el.style.height = newSize + "px";
        }

        // ==========================================
        // 3. HỆ THỐNG ĐIỀU KHIỂN & VẬT LÝ
        // ==========================================
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles.length = 0;
            for (let i = 0; i < STAR_COUNT; i++) {
                particles.push(createParticle(true));
            }
        }

        function resolveCrowding() {
            const radius = 100;
            const threshold = 6;
            for (let i = 0; i < objects.length; i++) {

                if (objects[i].knockTime > 15) continue;

                let count = 0;
                for (let j = 0; j < objects.length; j++) {
                    let dx = objects[i].x - objects[j].x;
                    let dy = objects[i].y - objects[j].y;
                    if (dx * dx + dy * dy < radius * radius) count++;
                }
                if (count > threshold) {
                    let angle = Math.random() * Math.PI * 2;
                    objects[i].vx += Math.cos(angle) * 5;
                    objects[i].vy += Math.sin(angle) * 5;
                    objects[i].knockTime = 10;
                    applyRandomSize(objects[i]);
                }
            }
        }

        function regionControl() {
            let grid = 4;
            let cellW = canvas.width / grid;
            let cellH = canvas.height / grid;
            let cells = Array.from({ length: grid * grid }, () => []);

            objects.forEach((o, i) => {
                let cx = Math.max(0, Math.min(grid - 1, Math.floor(o.x / cellW)));
                let cy = Math.max(0, Math.min(grid - 1, Math.floor(o.y / cellH)));
                cells[cy * grid + cx].push(i);
            });

            cells.forEach(cell => {
                if (cell.length < 2) createObject();
                if (cell.length > 12) {
                    for (let i = 0; i < 2; i++) {
                        let idx = cell[Math.floor(Math.random() * cell.length)];
                        if (objects[idx]) {
                            objects[idx].el.remove();
                            objects.splice(idx, 1);
                        }
                    }
                }
            });
        }

        // ==========================================
        // 4. VÒNG LẶP VẼ (DRAW LOOP)
        // ==========================================
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Cập nhật Emitter
            emitter.x += emitter.vx;
            emitter.y += emitter.vy;
            if (emitter.x < 0 || emitter.x > canvas.width) emitter.vx *= -1;
            if (emitter.y < 0 || emitter.y > canvas.height) emitter.vy *= -1;

            // Vẽ Sao nền trắng
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                p.opacity += p.fade;
                if (p.opacity > 1 || p.opacity < 0) p.fade *= -1;
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    Object.assign(p, createParticle(false));
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, p.opacity)})`;
                ctx.fill();
            });

            // Vẽ Sao đuôi cầu vồng
            for (let i = trailParticles.length - 1; i >= 0; i--) {
                let t = trailParticles[i];
                t.x += t.vx; t.y += t.vy;
                t.opacity -= 0.02;
                if (t.opacity <= 0) { trailParticles.splice(i, 1); continue; }
                ctx.beginPath();
                ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
                ctx.fillStyle = t.color + `${t.opacity})`;
                ctx.fill();
            }

            // Vẽ Sao xẹt (Small Stars)
            for (let i = smallStars.length - 1; i >= 0; i--) {
                let s = smallStars[i];
                s.x += s.vx; s.y += s.vy; s.life++;
                let alpha = 1 - (s.life / s.maxLife);
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * 2, s.y - s.vy * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.stroke();
                if (s.life > s.maxLife) smallStars.splice(i, 1);
            }

            // Vẽ Sao băng lớn (Quỹ đạo cong)
            if (bigStar) {
                bigStar.vy += bigStar.curve;
                bigStar.x += bigStar.vx;
                bigStar.y += bigStar.vy;
                let angle = Math.atan2(bigStar.vy, bigStar.vx);

                for (let i = 0; i < 5; i++) {
                    let hue = (Date.now() / 5 + i * 10) % 360;
                    trailParticles.push({
                        x: bigStar.x, y: bigStar.y,
                        size: Math.random() * 3 + 1,
                        vx: -Math.cos(angle) * 3 + (Math.random() - 0.5) * 2,
                        vy: -Math.sin(angle) * 3 + (Math.random() - 0.5) * 2,
                        opacity: 1, color: `hsla(${hue}, 90%, 70%, `
                    });
                }

                ctx.save();
                ctx.translate(bigStar.x, bigStar.y);
                ctx.rotate(angle);
                ctx.beginPath();
                ctx.moveTo(0, 0); ctx.lineTo(-40, 0);
                ctx.lineWidth = 6;
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
                ctx.shadowBlur = 20; ctx.shadowColor = "cyan";
                ctx.stroke();
                ctx.restore();

                objects.forEach(o => {
                    let dx = o.x + o.size / 2 - bigStar.x;
                    let dy = o.y + o.size / 2 - bigStar.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 180) {
                        o.vx = (dx / Math.sqrt(dx * dx + dy * dy)) * 12;
                        o.vy = (dy / Math.sqrt(dx * dx + dy * dy)) * 12;
                        o.knockTime = 25;
                    }
                });

                if (bigStar.x > canvas.width + 500 || bigStar.y < -500 || bigStar.y > canvas.height + 500) bigStar = null;
            }
        }

        function update() {
            drawBackground();
            crowdTimer++; regionTimer++;
            if (crowdTimer > CROWD_DELAY) { resolveCrowding(); crowdTimer = 0; }
            if (regionTimer > 180) { regionControl(); regionTimer = 0; }

            objects.forEach(o => {
                let dx = o.x + o.size / 2 - mouse.x;
                let dy = o.y + o.size / 2 - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                // ==========================================
                // TƯƠNG TÁC VỚI CHUỘT (CLICK / LỖ ĐEN / ĐẨY LÙI)
                // ==========================================
                if (isMouseDown && (Date.now() - mouseDownTime > 300)) {
                    // Kích hoạt Lỗ Đen khi giữ chuột > 0.15s
                    if (dist < 9999) {
                        isPulling = true;
                        o.vx -= (dx / dist) * 2.5;
                        o.vy -= (dy / dist) * 2.5;
                        o.vx *= 0.85; // Ma sát để tụ lại
                        o.vy *= 0.85;
                        o.va = (Math.random() - 0.5) * 30; // Xoay tít
                    }
                } else if (!isMouseDown) {
                    // Không giữ chuột -> Rẽ ra như cũ
                    if (dist < 120 && dist > 0 && o.knockTime < 40) {
                        let nx = dx / dist;
                        let ny = dy / dist;
                        o.vx = nx * 10;
                        o.vy = ny * 10;
                        o.knockTime = 30;
                        o.el.src = randomGif();
                        applyRandomSize(o);
                    }
                }

                // ==========================================
                // NỘI SUY LỰC ĐẨY / QUÁN TÍNH
                // ==========================================
                if (o.knockTime > 0) {
                    o.knockTime--;
                    o.vx *= 0.95;
                    o.vy *= 0.95;
                } else if (!isMouseDown) {
                    // Trôi nổi bình thường nếu không bị hút
                    o.vx += (o.baseVx - o.vx) * 0.05;
                    o.vy += (o.baseVy - o.vy) * 0.05;
                }

                o.x += o.vx; o.y += o.vy; o.angle += o.va;

                if (o.x < 0) { o.x = 0; o.baseVx *= -1; o.vx *= -0.5; }
                if (o.x > window.innerWidth - o.size) { o.x = window.innerWidth - o.size; o.baseVx *= -1; o.vx *= -0.5; }
                if (o.y < 0) { o.y = 0; o.baseVy *= -1; o.vy *= -0.5; }
                if (o.y > window.innerHeight - o.size) { o.y = window.innerHeight - o.size; o.baseVy *= -1; o.vy *= -0.5; }

                if (o.scale !== 1) {
                    o.scaleV += (1 - o.scale) * 0.15;
                    o.scaleV *= 0.8;
                    o.scale += o.scaleV;
                }

                o.el.style.left = o.x + "px";
                o.el.style.top = o.y + "px";
                o.el.style.transform = `rotate(${o.angle}deg) scale(${o.scale})`;
            });
            requestAnimationFrame(update);
        }

        // ==========================================
        // 5. KHỞI CHẠY & SỰ KIỆN CHUỘT
        // ==========================================
        resize();
        window.addEventListener("resize", resize);

        window.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // BẮT ĐẦU NHẤN CHUỘT
        window.addEventListener("mousedown", (e) => {
            isMouseDown = true;
            mouseDownTime = Date.now();
        });

        // NHẢ CHUỘT RA (PHIÊN BẢN NỔ NGẪU NHIÊN & LỰC VĂNG KHÁC NHAU)
        window.addEventListener("mouseup", (e) => {
            isMouseDown = false;
            let holdDuration = Date.now() - mouseDownTime;

            if (holdDuration < 400) {
                // Nhấn thả nhanh -> Sinh mèo
                createObject(e.clientX - 45, e.clientY - 45);
            } else {
                // Giữ lâu nhả ra -> Vụ nổ Big Bang
                if (isPulling) {
                    objects.forEach(o => {
                        let randomAngle = Math.random() * Math.PI * 2;
                        let nx = Math.cos(randomAngle);
                        let ny = Math.sin(randomAngle);

                        // --- CHỈNH SỬA TẠI ĐÂY ---
                        // Tạo một lực văng ngẫu nhiên từ 60 đến 160 cho mỗi đối tượng
                        let randomForce = 60 + Math.random() * 100;

                        o.vx = nx * randomForce;
                        o.vy = ny * randomForce;

                        // Tiện thể, cho thời gian bay (trước khi hãm phanh) cũng ngẫu nhiên luôn!
                        // Con nào knockTime nhỏ sẽ phanh lại sớm, con nào lớn sẽ bay đập tận tường
                        o.knockTime = 50 + Math.random() * 50;

                        applyRandomSize(o);
                    });
                }
            }
            isPulling = false;
        });

        for (let i = 0; i < INIT_COUNT; i++) createObject();
        setInterval(() => {
            if (Math.random() < 0.8) spawnSmallStar();
        }, 500);
        (function loopBig() { setTimeout(() => { spawnBigStar(); loopBig(); }, 8000 + Math.random() * 4000); })();

        update();

        // YouTube Music
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);
        let ytPlayer;
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                videoId: 'oUI_tVU77cw',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'oUI_tVU77cw' },
                events: {
                    'onReady': (e) => {
                        e.target.setVolume(50);
                        document.body.addEventListener('click', () => {
                            if (ytPlayer.getPlayerState() !== 1) ytPlayer.playVideo();
                        }, { once: true });
                    }
                }
            });
        }
    </script>
</body>

</html>
