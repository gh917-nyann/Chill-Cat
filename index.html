<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Nyann</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            /* Nền vũ trụ Gradient từ bản 1 */
            background: linear-gradient(270deg, #0f2027, #203a43, #2c5364, #1a2a6c);
            background-size: 800% 800%;
            animation: gradientMove 20s ease infinite;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            /* Để không block sự kiện chuột của ảnh */
        }

        img {
            position: absolute;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>
    <div id="yt-player" style="position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px;"></div>

    <script>
        // ==========================================
        // PHẦN 1: SETUP NỀN VŨ TRỤ (CANVAS)
        // ==========================================

        const canvas = document.getElementById("bg");
        const ctx = canvas.getContext("2d");

        const particles = [];
        const trailParticles = [];
        const STAR_COUNT = 400; // Tăng lên 400 cho dày đặc

        // Điểm phát xạ sao di động
        let emitter = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2,
            vx: 1.2, // Tốc độ di chuyển của "nguồn" sao
            vy: 0.8
        };

        function createParticle(isInitial = false) {
            return {
                // Nếu khởi tạo thì rải đều, nếu sinh ra lúc đang chạy thì lấy từ emitter
                x: isInitial ? Math.random() * canvas.width : emitter.x,
                y: isInitial ? Math.random() * canvas.height : emitter.y,
                size: Math.random() * 2.5,
                opacity: Math.random(),
                fade: Math.random() * 0.02 + 0.005,
                // Vận tốc hạt bắn ra ngẫu nhiên mọi hướng
                vx: (Math.random() - 0.5) * 2,
                vy: (Math.random() - 0.5) * 2,

                color: "rgba(255, 255, 255, "
            };
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles.length = 0;
            for (let i = 0; i < STAR_COUNT; i++) {
                particles.push(createParticle(true));
            }
        }
        resize();
        window.addEventListener("resize", resize);

        // Sao băng nhỏ (Small Stars)
        const smallStars = [];
        function spawnSmallStar(x, y) {
            smallStars.push({
                x: x ?? Math.random() * canvas.width,
                y: y ?? Math.random() * canvas.height * 0.5,
                vx: 5 + Math.random() * 3,
                vy: 2 + Math.random() * 2,
                life: 0,
                maxLife: 40
            });
        }
        setInterval(() => { if (Math.random() < 0.8) spawnSmallStar(); }, 700);

        // Sao chổi lớn (Big Star)
        let bigStar = null;
        function spawnBigStar() {
            bigStar = {
                x: -150,
                y: Math.random() * canvas.height,
                vx: 10 + Math.random() * 3,
                vy: (Math.random() - 0.5) * 2
            };
        }
        (function loopBig() {
            setTimeout(() => { spawnBigStar(); loopBig(); }, 8000 + Math.random() * 4000);
        })();


        // ==========================================
        // PHẦN 2: LOGIC VẬT THỂ (GIFs) & TƯƠNG TÁC
        // ==========================================
        const gifs = [];
        const TOTAL_GIFS = 18;
        for (let i = 1; i <= TOTAL_GIFS; i++) {
            gifs.push(`gif/gif${i}.gif`);
        }

        const objects = [];
        const INIT_COUNT = 120; // Giữ số lượng 120 từ bản gốc của bạn
        let mouse = { x: -1000, y: -1000 };

        window.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Bắt sự kiện nhấn chuột để spawn object tại vị trí con trỏ
        window.addEventListener("mousedown", (e) => {
            // Gọi hàm tạo object. 
            // Trừ đi 45px (khoảng một nửa kích thước trung bình của GIF) 
            // để object sinh ra có tâm nằm ngay mũi tên chuột thay vì bị lệch góc.
            createObject(e.clientX - 45, e.clientY - 45);
        });

        function randomSize() { return 60 + Math.random() * 60; }
        function randomGif() { return gifs[Math.floor(Math.random() * gifs.length)]; }

        function createObject(x, y) {
            const img = document.createElement("img");
            img.src = randomGif();

            let size = randomSize();
            img.style.width = size + "px";
            img.style.height = size + "px";
            document.body.appendChild(img);

            let baseVx = (Math.random() - 0.5) * 2;
            let baseVy = (Math.random() - 0.5) * 2;

            objects.push({
                el: img,
                size: size,
                x: x ?? Math.random() * (window.innerWidth - size),
                y: y ?? Math.random() * (window.innerHeight - size),
                vx: baseVx,
                vy: baseVy,
                baseVx: baseVx,
                baseVy: baseVy,
                angle: Math.random() * 360,
                va: (Math.random() - 0.5) * 12, // Xoay nhanh hơn từ bản của bạn
                knockTime: 0,
                scale: 0,      // Bắt đầu từ kích thước tàng hình (0)
                scaleV: 0.2    // Vận tốc bung ra ban đầu
            });
        }

        // Khởi tạo vật thể
        for (let i = 0; i < INIT_COUNT; i++) createObject();

        // Hàm đổi size ngẫu nhiên (từ bản của bạn)
        function applyRandomSize(o) {
            let newSize = randomSize();
            o.size = newSize;
            o.el.style.width = newSize + "px";
            o.el.style.height = newSize + "px";
        }

        // Hệ thống chống kẹt (Crowding) - Tối ưu hóa bằng Timer để đỡ lag
        let crowdTimer = 0;
        const CROWD_DELAY = 10; // Chạy mỗi 10 frame thay vì mỗi frame để giữ FPS mượt

        function resolveCrowding() {
            const radius = 100;
            const threshold = 6;

            for (let i = 0; i < objects.length; i++) {
                let count = 0;
                for (let j = 0; j < objects.length; j++) {
                    let dx = objects[i].x - objects[j].x;
                    let dy = objects[i].y - objects[j].y;
                    if (dx * dx + dy * dy < radius * radius) count++;
                }

                if (count > threshold) {
                    let angle = Math.random() * Math.PI * 2;
                    let force = 4 + Math.random() * 4;

                    objects[i].vx += Math.cos(angle) * force;
                    objects[i].vy += Math.sin(angle) * force;
                    objects[i].knockTime = 10;
                    applyRandomSize(objects[i]); // Kèm đổi size khi văng ra
                }
            }
        }

        // Hệ thống phân bổ khu vực (Region Control từ bản 1)
        let regionTimer = 0;
        function regionControl() {
            let grid = 4;
            let cellW = canvas.width / grid;
            let cellH = canvas.height / grid;
            let cells = Array.from({ length: grid * grid }, () => []);

            objects.forEach((o, i) => {
                let cx = Math.floor(o.x / cellW);
                let cy = Math.floor(o.y / cellH);
                let idx = cy * grid + cx;
                if (cells[idx]) cells[idx].push(i);
            });

            cells.forEach(cell => {
                if (cell.length < 2) {
                    for (let i = 0; i < 2; i++) createObject(Math.random() * canvas.width, Math.random() * canvas.height);
                }
                if (cell.length > 12) {
                    for (let i = 0; i < 2; i++) {
                        let idx = cell[Math.floor(Math.random() * cell.length)];
                        if (objects[idx]) {
                            objects[idx].el.remove();
                            objects.splice(idx, 1);
                        }
                    }
                }
            });
        }

        // ==========================================
        // PHẦN 3: VÒNG LẶP CHÍNH (MAIN LOOP)
        // ==========================================
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Cập nhật vị trí điểm phát xạ (Emitter)
            emitter.x += emitter.vx;
            emitter.y += emitter.vy;

            // Nảy emitter khi chạm viền để nó không bay mất tích
            if (emitter.x < 0 || emitter.x > canvas.width) emitter.vx *= -1;
            if (emitter.y < 0 || emitter.y > canvas.height) emitter.vy *= -1;

            // 2. Vẽ và cập nhật từng hạt sao
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                p.opacity += p.fade;
                if (p.opacity > 1 || p.opacity < 0) p.fade *= -1;

                // Nếu sao bay ra khỏi màn hình -> Reset về vị trí hiện tại của Emitter
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    Object.assign(p, createParticle(false));
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color + `${Math.max(0, p.opacity)})`;
                ctx.fill();
            });
            ctx.shadowBlur = 0; // Reset shadow sau khi vẽ xong sao

            for (let i = trailParticles.length - 1; i >= 0; i--) {
                let t = trailParticles[i];
                t.x += t.vx;
                t.y += t.vy;
                t.opacity -= 0.02; // Làm mờ dần

                if (t.opacity <= 0) {
                    trailParticles.splice(i, 1); // Xóa hạt khi không còn nhìn thấy
                    continue;
                }

                ctx.beginPath();
                ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
                ctx.fillStyle = t.color + `${t.opacity})`;
                ctx.fill();
            }

            // Vẽ sao nhỏ
            for (let i = smallStars.length - 1; i >= 0; i--) {
                let s = smallStars[i];
                s.x += s.vx; s.y += s.vy; s.life++;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * 4, s.y - s.vy * 4);
                ctx.strokeStyle = "white";
                ctx.stroke();
                if (s.life > s.maxLife) smallStars.splice(i, 1);
            }


            if (bigStar) {
                bigStar.x += bigStar.vx;
                bigStar.y += bigStar.vy;

                // --- HIỆU ỨNG MỚI: BẮN SAO Ở ĐUÔI ---
                // Mỗi khung hình, ta lấy 2-3 hạt particles ngẫu nhiên để "tái sinh" tại đuôi sao băng
                for (let i = 0; i < 5; i++) {
                    let hue = (Date.now() / 5 + i * 10) % 360;
                    trailParticles.push({
                        x: bigStar.x,
                        y: bigStar.y,
                        size: Math.random() * 3 + 1,
                        vx: -bigStar.vx * 0.2 + (Math.random() - 0.5) * 2,
                        vy: -bigStar.vy * 0.2 + (Math.random() - 0.5) * 2,
                        opacity: 1,
                        color: `hsla(${hue}, 90%, 70%, `
                    });
                }

                // Vẽ đầu sao băng lớn
                ctx.beginPath();
                ctx.moveTo(bigStar.x, bigStar.y);
                ctx.lineTo(bigStar.x - bigStar.vx * 15, bigStar.y - bigStar.vy * 15);
                ctx.lineWidth = 6; // Làm dày hơn cho ngầu
                ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";

                // Thêm hiệu ứng phát sáng cho sao băng
                ctx.shadowBlur = 20;
                ctx.shadowColor = "cyan";
                ctx.stroke();
                ctx.shadowBlur = 0; // Reset ngay để không lag

                // Giữ nguyên logic đẩy vật thể (GIF) cũ của bạn
                objects.forEach(o => {
                    let dx = o.x + o.size / 2 - bigStar.x;
                    let dy = o.y + o.size / 2 - bigStar.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 180) {
                        let nx = dx / dist;
                        let ny = dy / dist;
                        o.vx = nx * 12;
                        o.vy = ny * 12;
                        o.knockTime = 25;
                    }
                });

                if (bigStar.x > canvas.width + 500) bigStar = null;
            }
        }

        function update() {
            drawBackground();

            // Chạy các hệ thống có độ trễ
            crowdTimer++;
            regionTimer++;
            if (crowdTimer > CROWD_DELAY) { resolveCrowding(); crowdTimer = 0; }
            if (regionTimer > 180) { regionControl(); regionTimer = 0; }

            // Xử lý các vật thể
            objects.forEach(o => {

                // Tương tác chuột (Bản của bạn: văng + đổi ảnh + đổi size)
                let dx = o.x + o.size / 2 - mouse.x;
                let dy = o.y + o.size / 2 - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 120 && dist > 0) {
                    let nx = dx / dist;
                    let ny = dy / dist;
                    o.vx = nx * 10;
                    o.vy = ny * 10;
                    o.knockTime = 30;
                    o.el.src = randomGif();
                    applyRandomSize(o);
                }

                // Nội suy lực đẩu
                if (o.knockTime > 0) {
                    o.knockTime--;
                    o.vx *= 0.95;
                    o.vy *= 0.95;
                } else {
                    o.vx = o.baseVx;
                    o.vy = o.baseVy;
                }

                o.x += o.vx;
                o.y += o.vy;
                o.angle += o.va;

                // Xử lý va chạm viền (Logic nảy viền chuẩn xác từ bản của bạn)
                if (o.x < 0) {
                    o.x = 0;
                    o.baseVx *= -1;
                    o.vx *= -0.5;
                }
                if (o.x > window.innerWidth - o.size) {
                    o.x = window.innerWidth - o.size;
                    o.baseVx *= -1;
                    o.vx *= -0.5;
                }
                if (o.y < 0) {
                    o.y = 0;
                    o.baseVy *= -1;
                    o.vy *= -0.5;
                }
                if (o.y > window.innerHeight - o.size) {
                    o.y = window.innerHeight - o.size;
                    o.baseVy *= -1;
                    o.vy *= -0.5;
                }

                // ===================================
                // Hiệu ứng "Bung ra" (Spring effect)
                // ===================================
                if (o.scale !== 1) {
                    o.scaleV += (1 - o.scale) * 0.15; // Lực đàn hồi kéo tỷ lệ về mức 1
                    o.scaleV *= 0.8; // Độ ma sát để dừng lại dần
                    o.scale += o.scaleV;

                    // Nếu đã nảy xong thì chốt ở mức 1 cho nhẹ máy
                    if (Math.abs(1 - o.scale) < 0.01 && Math.abs(o.scaleV) < 0.01) {
                        o.scale = 1;
                    }
                }

                // Áp dụng CSS (thêm lệnh scale() vào transform)
                o.el.style.left = o.x + "px";
                o.el.style.top = o.y + "px";
                o.el.style.transform = `rotate(${o.angle}deg) scale(${o.scale})`;
            });

            requestAnimationFrame(update);
        }

        // Bắt đầu vòng lặp
        update();

        // ==========================================
        // PHẦN: NHẠC NỀN YOUTUBE ẨN
        // ==========================================
        // 1. Tải thư viện YouTube IFrame API
        let tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        let firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let ytPlayer;

        // ID của video YouTube bạn muốn phát (lấy phần sau v= trên link youtube)
        // Ví dụ link: https://www.youtube.com/watch?v=jfKfPfyJRdk -> ID là jfKfPfyJRdk
        const YOUTUBE_VIDEO_ID = 'oUI_tVU77cw'; // Lofi chill làm ví dụ

        // 2. Hàm này sẽ tự động chạy khi thư viện YouTube tải xong
        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                videoId: YOUTUBE_VIDEO_ID,
                playerVars: {
                    'autoplay': 0, // Trình duyệt chặn autoplay có tiếng, nên ta để 0 và dùng click event
                    'controls': 0,
                    'showinfo': 0,
                    'rel': 0,
                    'loop': 1,
                    'playlist': YOUTUBE_VIDEO_ID // Cần có dòng này để loop (lặp lại) hoạt động
                },
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        // 3. Hàm xử lý khi Player đã sẵn sàng
        function onPlayerReady(event) {
            event.target.setVolume(50); // Set âm lượng từ 0 đến 100

            // Bắt sự kiện click chuột lần đầu tiên trên toàn trang để phát nhạc
            document.body.addEventListener('click', function () {
                if (ytPlayer && ytPlayer.getPlayerState() !== YT.PlayerState.PLAYING) {
                    ytPlayer.playVideo();
                }
            }, { once: true }); // { once: true } giúp sự kiện này chỉ kích hoạt đúng 1 lần
        }
    </script>

</body>

</html>
